name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: yarn install --ignore-engines

      - name: Build
        run: yarn build
        env:
          BASE_PATH: /Darapet-Technology/
          VITE_SUPABASE_URL: https://lvmvimijhlxsnnmrjvie.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx2bXZpbWlqaGx4c25ubXJqdmllIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1MDI4MDQsImV4cCI6MjA5OTA3ODgwNH0.GHZGJP5evc_K2csEaYJwdBlI0blQdV5XsS50W9EGMNM

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
