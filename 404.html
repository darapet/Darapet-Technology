    (function () {

      var path = window.location.pathname.slice(base.length) || '/';
      var search = window.location.search;
      var hash = window.location.hash; // Supabase tokens live in the hash — preserve them
      window.location.replace(base + '/?p=' + encodeURIComponent(path + search) + hash);
    })();
